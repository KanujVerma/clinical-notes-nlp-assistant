services:
  - type: web
    name: clinical-notes-nlp-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt && pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl
    startCommand: gunicorn --chdir backend "app:create_app()" --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # set manually in Render dashboard
